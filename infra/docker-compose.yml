# Production-oriented stack: panel (3000), API (4000), node-agent (7001) + Postgres + Redis.
# Secrets and browser API URL: use infra/.env.deploy (generated by scripts/ubuntu-first-install.sh).
#
# From repository root:
#   docker compose -p wavehosting --env-file infra/.env.deploy -f infra/docker-compose.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: wave_hosting
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  node-agent:
    build:
      context: ..
      dockerfile: apps/node-agent/Dockerfile
    ports:
      - '7001:7001'
    environment:
      AGENT_PORT: 7001
      RUNTIME_DRIVER: docker
      SERVER_DATA_ROOT: /var/lib/wave-hosting/servers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - wave_server_data:/var/lib/wave-hosting/servers
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      API_PORT: 4000
      API_HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-change-me}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/wave_hosting
      REDIS_URL: redis://redis:6379
      REMOTE_AGENT_URL: http://node-agent:7001
    volumes:
      - wave_api_data:/app/apps/api/.data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      node-agent:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://127.0.0.1:4000}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  wave_server_data:
  wave_api_data:
